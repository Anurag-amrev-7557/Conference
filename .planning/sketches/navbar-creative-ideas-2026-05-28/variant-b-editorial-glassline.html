<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar Sketch B - Editorial Glassline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f6f8;
        font-family: "Plus Jakarta Sans", Inter, ui-sans-serif, system-ui, sans-serif;
        color: #101115;
      }
      .stage { padding: 24px; }
      .nav {
        max-width: 1140px;
        margin: 0 auto;
        border-radius: 999px;
        border: 1px solid rgba(16,17,21,0.08);
        background: rgba(255,255,255,0.84);
        backdrop-filter: blur(20px);
        box-shadow: 0 8px 26px -18px rgba(0,0,0,0.28);
        height: 64px;
        padding: 0 10px 0 18px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
      }
      .brand {
        display: inline-flex; align-items: center; gap: 11px;
        font-size: 22px; font-weight: 620; letter-spacing: -0.018em;
      }
      .brand-mark {
        width: 30px; height: 30px; border-radius: 50%;
        border: 1px solid rgba(16,17,21,0.1);
        display: grid; place-items: center;
        background: #ffffff;
      }
      .links { display: flex; align-items: center; gap: 4px; }
      .link {
        position: relative;
        height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        color: #2a2c33;
        font-size: 15px;
        font-weight: 600;
      }
      .link:hover { background: rgba(0,0,0,0.045); }
      .link.conf {
        color: #101115;
        background: rgba(16,17,21,0.06);
        border: 1px solid rgba(16,17,21,0.12);
      }
      .link.conf::after {
        content: "";
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 7px;
        height: 1.5px;
        border-radius: 2px;
        background: #101115;
      }
      .cta-wrap { display: flex; justify-content: end; }
      .cta {
        height: 40px; padding: 0 23px;
        border-radius: 999px;
        display: inline-flex; align-items: center;
        color: #101115;
        background: #fff;
        border: 1px solid rgba(16,17,21,0.14);
        font-size: 13px; font-weight: 650;
      }
      .cta:hover { background: #f9f9fb; }
    </style>
  </head>
  <body>
    <div class="stage">
      <nav class="nav">
        <div class="brand"><span class="brand-mark">S</span> Superhumanly -Thoughts</div>
        <div class="links">
          <a class="link">Blog</a>
          <a class="link">Events</a>
          <a class="link conf">Conference</a>
          <a class="link">Community</a>
          <a class="link">About Us</a>
        </div>
        <div class="cta-wrap"><a class="cta">Join Now</a></div>
      </nav>
    </div>
  </body>
</html>
