<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar Sketch C - Product Led Signal</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f4f5f7;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      .shell { padding: 24px; }
      .nav {
        max-width: 1140px;
        margin: 0 auto;
        height: 66px;
        border-radius: 999px;
        background: #ffffff;
        border: 1px solid rgba(15,18,24,0.08);
        box-shadow: 0 14px 32px -24px rgba(15,18,24,0.35);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 10px 0 17px;
      }
      .brand { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 650; letter-spacing: -0.02em; }
      .mark {
        width: 31px; height: 31px; border-radius: 50%;
        background: linear-gradient(160deg, #14161d, #0b0c10);
        color: #fff; display: grid; place-items: center; font-size: 13px;
      }
      .links { display: flex; align-items: center; gap: 5px; justify-content: center; }
      .link {
        height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        font-size: 15px;
        font-weight: 600;
        color: #212530;
      }
      .link:hover { background: #f0f2f6; }
      .link.conf {
        border: 1px solid rgba(14, 17, 23, 0.15);
        background: #12151b;
        color: #fff;
      }
      .link.conf span {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.72;
        margin-left: 8px;
      }
      .cta-wrap { display: flex; justify-content: end; }
      .cta {
        height: 40px;
        padding: 0 24px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        color: #fff;
        background: #12151b;
        border: 1px solid #12151b;
        font-size: 13px;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <nav class="nav">
        <div class="brand"><span class="mark">S</span> Superhumanly -Thoughts</div>
        <div class="links">
          <a class="link">Blog</a>
          <a class="link">Events</a>
          <a class="link conf">Conference <span>Flagship</span></a>
          <a class="link">Community</a>
          <a class="link">About Us</a>
        </div>
        <div class="cta-wrap"><a class="cta">Join Now</a></div>
      </nav>
    </div>
  </body>
</html>
