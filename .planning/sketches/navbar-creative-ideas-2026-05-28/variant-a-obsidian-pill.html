<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar Sketch A - Obsidian Pill</title>
    <style>
      :root {
        --bg: #f7f7f6;
        --ink: #0f0f10;
        --muted: #5e6066;
        --line: rgba(15, 15, 16, 0.09);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        background:
          radial-gradient(circle at 15% 20%, rgba(255,255,255,0.9), transparent 30%),
          linear-gradient(var(--bg), #f3f3f2);
        color: var(--ink);
      }
      .wrap { padding: 22px; }
      .nav {
        margin: 0 auto;
        max-width: 1120px;
        height: 62px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(18px) saturate(130%);
        box-shadow: 0 1px 0 rgba(255,255,255,0.85) inset, 0 10px 30px -16px rgba(0,0,0,0.2);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 10px 0 16px;
      }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 650; font-size: 23px; letter-spacing: -0.02em; }
      .brand-dot { width: 31px; height: 31px; border-radius: 999px; background: #121212; color: #fff; display: grid; place-items: center; font-size: 14px; }
      .links { display: flex; align-items: center; gap: 6px; justify-content: center; }
      .link {
        height: 40px; padding: 0 15px; border-radius: 999px;
        display: inline-flex; align-items: center;
        color: #202226; font-size: 15px; font-weight: 600; letter-spacing: -0.005em;
      }
      .link:hover { background: rgba(0,0,0,0.05); }
      .link.conf {
        background: #111114; color: #fff; border: 1px solid #111114;
      }
      .cta-wrap { display: flex; justify-content: end; }
      .cta {
        height: 40px; padding: 0 24px; border-radius: 999px;
        border: 1px solid #111114;
        background: #111114; color: #fff;
        display: inline-flex; align-items: center;
        font-size: 13px; font-weight: 650; letter-spacing: 0.005em;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav">
        <div class="brand"><span class="brand-dot">S</span> Superhumanly -Thoughts</div>
        <div class="links">
          <a class="link">Blog</a>
          <a class="link">Events</a>
          <a class="link conf">Conference</a>
          <a class="link">Community</a>
          <a class="link">About Us</a>
        </div>
        <div class="cta-wrap"><a class="cta">Join Now</a></div>
      </nav>
    </div>
  </body>
</html>
