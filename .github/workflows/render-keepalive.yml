name: Render Keepalive

on:
  schedule:
    # Best-effort only — GitHub free schedules are often delayed; use UptimeRobot (docs/RENDER_KEEPALIVE.md).
    - cron: "*/5 * * * *"
    - cron: "2,12,22,32,42,52 * * * *"
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render API
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          URL="${RENDER_HEALTHCHECK_URL:-https://superhumanly-thoughts.onrender.com/ping}"
          if [ -z "${RENDER_HEALTHCHECK_URL}" ]; then
            echo "RENDER_HEALTHCHECK_URL secret not set — using default: ${URL}"
            echo "Add repo secret to override: Settings → Secrets → Actions"
          fi
          echo "Pinging ${URL}"
          curl --fail --silent --show-error \
            --max-time 25 \
            --retry 3 \
            --retry-delay 3 \
            --retry-all-errors \
            "${URL}"
