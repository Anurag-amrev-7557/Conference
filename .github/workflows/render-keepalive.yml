name: Render Keepalive

on:
  schedule:
    # Every 5 minutes — Render free tier sleeps after ~15 min idle.
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render API
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          # /health until latest API is deployed; override with .../ping for a lighter wake-up.
          URL="${RENDER_HEALTHCHECK_URL:-https://superhumanly-thoughts.onrender.com/health}"
          if [ -z "${RENDER_HEALTHCHECK_URL}" ]; then
            echo "RENDER_HEALTHCHECK_URL secret not set — using default: ${URL}"
            echo "Add repo secret to override: Settings → Secrets → Actions"
          fi
          echo "Pinging ${URL}"
          curl --fail --silent --show-error \
            --max-time 25 \
            --retry 3 \
            --retry-delay 3 \
            --retry-all-errors \
            "${URL}"
