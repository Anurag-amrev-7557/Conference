name: Book Website CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_API_URL: https://ci-placeholder.example.com/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend unit tests
        run: npm test

      - name: Frontend build
        run: BOOTSTRAP_OPTIONAL=1 PRERENDER_SKIP=1 npm run build:no-prerender

      - name: Server build
        run: cd server && npm run build

      - name: Server unit tests
        run: cd server && npm test

      - name: npm audit (frontend)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: npm audit (server)
        run: cd server && npm audit --audit-level=high
        continue-on-error: true

      - name: Server health smoke check
        run: |
          cd server
          NODE_ENV=production JWT_SECRET=ci-smoke-secret ADMIN_PASSWORD=ci-admin-password node dist/index.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for i in {1..20}; do
            if curl --silent --fail http://localhost:3001/health > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            sleep 1
          done

          echo "Health check failed: /health did not respond in time"
          exit 1
