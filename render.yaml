# Render Blueprint — API only. Frontend deploys on Firebase Hosting.
# Guide: docs/FIREBASE_DEPLOY.md

services:
  - type: web
    name: book-website-api
    runtime: node
    rootDir: server
    buildCommand: npm ci && npm run build && npx prisma generate && npx prisma db push
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: STORAGE_PROVIDER
        value: cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SITE_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_ALLOWED_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: REGISTRATION_NOTIFY_EMAIL
        sync: false
